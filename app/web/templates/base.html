<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Trade / Don't-Trade Scale</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235b8cff'/%3E%3Cpath d='M7 21l6-6 4 4 8-9' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#5b8cff"/>
        <path d="M7 21l6-6 4 4 8-9" fill="none" stroke="#fff" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Trade Scale <span class="brand-sub">· NY session</span></span>
    </div>
    <nav>
      <a href="/"        class="{{ 'active' if request.url.path == '/' else '' }}">Dashboard</a>
      <a href="/history" class="{{ 'active' if request.url.path == '/history' else '' }}">History</a>
      <a href="/settings"class="{{ 'active' if request.url.path == '/settings' else '' }}">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Rule-based + trained engine · anchored to America/New_York · decision support, not financial advice</footer>
</body>
</html>
